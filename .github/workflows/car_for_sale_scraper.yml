name: QatarSale Scraper

on:
  schedule:
    - cron: '0 0 * * *'  
  workflow_dispatch:

jobs:
  detect_pages:

    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.build_matrix.outputs.matrix }}

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install "scrapling[all]"
          playwright install chromium
          playwright install-deps chromium
          python -m patchright install chromium

      - name: Detect pages
        id: build_matrix

        run: |
          python << 'EOF'

          import json
          import math
          import os

          from scrapling import StealthyFetcher

          URL = "https://qatarsale.com/ar/products/cars_for_sale?basic_search:StatusFilter=0"

          def get_last_page():

              page = StealthyFetcher.fetch(
                  URL,
                  headless=True,
                  network_idle=True,
                  timeout=30000
              )

              numbers = []

              for el in page.find_all("[data-testid^='at-paginator-page-']"):

                  a = el.find("a")

                  if not a:
                      continue

                  href = a.attrib.get("href", "")

                  if "page=" not in href:
                      continue

                  try:
                      numbers.append(int(href.split("page=")[-1]))
                  except ValueError:
                      pass

              return max(numbers) if numbers else 1


          last_page = get_last_page()

          print(f"Last page: {last_page}")

          N_JOBS = 40

          pages_per_job = math.ceil(last_page / N_JOBS)

          matrix = {"include": []}

          for i in range(N_JOBS):

              start = i * pages_per_job + 1
              end = min((i + 1) * pages_per_job, last_page)

              if start > last_page:
                  break

              matrix["include"].append({
                  "start": start,
                  "end": end
              })

          print(json.dumps(matrix, indent=2))

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={json.dumps(matrix)}")

          EOF


  scrape:
    needs: detect_pages
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect_pages.outputs.matrix) }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install "scrapling[all]"
          playwright install chromium
          playwright install-deps chromium
          python -m patchright install chromium

      - name: Run scraper
        env:
          CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
          CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}
        run: |
          python -u main.py ${{ matrix.start }} ${{ matrix.end }}

      - name: Upload CSV artifact
        uses: actions/upload-artifact@v4
        with:
          name: csv-${{ matrix.start }}-${{ matrix.end }}
          path: |
            all_products_flat_${{ matrix.start }}_${{ matrix.end }}.csv
            all_products_${{ matrix.start }}_${{ matrix.end }}_failed.txt
  merge:
    runs-on: ubuntu-latest
    needs: scrape
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pandas
        run: pip install pandas boto3 openpyxl

      - name: Download all CSV artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: csv-*
          merge-multiple: true
          path: csv_parts/

      - name: Merge and analyze
        run: |
          python << 'EOF'
          import pandas as pd
          import glob
          from datetime import datetime
          import json

          files = glob.glob('csv_parts/*.csv')
          if not files:
              print("No CSV files found. Nothing to merge.")
              now = datetime.now()
              with open('scrape_summary.txt', 'w', encoding='utf-8') as f:
                  f.write(f'=== cars_for_sale ===\n')
                  f.write(f'Run Date: {now.strftime("%Y-%m-%d %H:%M:%S")} UTC\n')
                  f.write(f'Status: NO DATA\n')
                  f.write(f'Total Rows: 0\n')
                  f.write(f'Files Merged: 0\n')
              # Create empty excel
              pd.DataFrame().to_excel('cars_for_sale.xlsx', index=False)
              exit(0)

          dfs = [pd.read_csv(f) for f in files]

          merged = pd.concat(dfs, ignore_index=True)
          merged = merged.drop_duplicates(subset=['product_url'], keep='first')
          merged.to_excel('cars_for_sale.xlsx', index=False)
          json_file = "cars_for_sale.json"
          json_data = merged.to_dict(orient='records')
          with open(json_file, 'w', encoding='utf-8') as f:
              json.dump(json_data, f, ensure_ascii=False, indent=2)
          
          print(f"JSON saved: {json_file} ({len(json_data)} records)")

          total = len(merged)
          now = datetime.now()
          print(f'Found {len(files)} CSV files to merge')
          print(f'Total Rows: {total}')

          # Summary file
          with open('scrape_summary.txt', 'w', encoding='utf-8') as f:
              f.write(f'=== cars_for_sale ===\n')
              f.write(f'Run Date: {now.strftime("%Y-%m-%d %H:%M:%S")} UTC\n')
              f.write(f'Status: DONE\n')
              f.write(f'Total Rows: {total}\n')
              f.write(f'Files Merged: {len(files)}\n\n')
              f.write('--- Column Analysis ---\n')
              for col in merged.columns:
                  missing = merged[col].isna().sum() + (merged[col] == '').sum()
                  pct = (missing / total) * 100 if total > 0 else 0
                  f.write(f'{col}: {missing} empty ({pct:.2f}%)\n')

              # Subcategory breakdown 
              if 'المصنع' in merged.columns:
                  f.write('\n--- By Manufacturer ---\n')
                  for mfr, count in merged['المصنع'].value_counts().items():
                      f.write(f'{mfr}: {count} products\n')
          EOF

      - name: Split by manufacturer
        run: |
          pip install openpyxl
          python split_by_manufacturer.py cars_for_sale.xlsx excel_by_manufacturer

      - name: Upload Excel files to R2
        env:
          CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
          CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}
        run: |
          python << 'EOF'
          import boto3, os, glob
          from datetime import datetime
          import pandas as pd

          client = boto3.client('s3',
              endpoint_url=os.environ['CF_R2_ENDPOINT_URL'],
              aws_access_key_id=os.environ['CF_R2_ACCESS_KEY_ID'],
              aws_secret_access_key=os.environ['CF_R2_SECRET_ACCESS_KEY'],
              region_name='auto'
          )
          dt = datetime.now()
          prefix = f"qatarsale/year={dt.year}/month={dt.strftime('%m')}/day={dt.strftime('%d')}/cars_for_sale/excel/by_manufacturer"
          bucket = os.environ['CF_R2_BUCKET_NAME']

          for f in glob.glob('excel_by_manufacturer/*.xlsx'):
              key = f"{prefix}/{os.path.basename(f)}"
              client.upload_file(f, bucket, key,
                  ExtraArgs={'ContentType': 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'})
              print(f"Uploaded: {key}")

              # Convert each Excel to JSON and upload
              df_split = pd.read_excel(f)
              json_split_file = f"{os.path.splitext(f)[0]}.json"
              df_split.to_dict(orient='records')
              with open(json_split_file, 'w', encoding='utf-8') as jf:
                  json.dump(df_split.to_dict(orient='records'), jf, ensure_ascii=False, indent=2)
                  
              json_prefix = f"qatarsale/year={dt.year}/month={dt.strftime('%m')}/day={dt.strftime('%d')}/cars_for_sale/json/by_manufacturer"
              json_key = f"{json_prefix}/{os.path.basename(json_split_file)}"
              client.upload_file(json_split_file, bucket, json_key,
                  ExtraArgs={'ContentType': 'application/json; charset=utf-8'})
              print(f"Uploaded JSON: {json_key}")
          EOF

      - name: Upload final Excel to R2
        env:
          CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
          CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}
        run: |
          python << 'EOF'
          import boto3, os
          from datetime import datetime

          client = boto3.client('s3',
              endpoint_url=os.environ['CF_R2_ENDPOINT_URL'],
              aws_access_key_id=os.environ['CF_R2_ACCESS_KEY_ID'],
              aws_secret_access_key=os.environ['CF_R2_SECRET_ACCESS_KEY'],
              region_name='auto'
          )
          dt = datetime.now()
          bucket = os.environ['CF_R2_BUCKET_NAME']
          key = f"qatarsale/year={dt.year}/month={dt.strftime('%m')}/day={dt.strftime('%d')}/cars_for_sale/excel/cars_for_sale.xlsx"

          client.upload_file('cars_for_sale.xlsx', bucket, key,
              ExtraArgs={'ContentType': 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'})
          print(f'Uploaded: {key}')

          key = f"qatarsale/year={dt.year}/month={dt.strftime('%m')}/day={dt.strftime('%d')}/cars_for_sale/json/cars_for_sale.json"
          
          client.upload_file(
              "cars_for_sale.json",
              bucket,
              key,
              ExtraArgs={"ContentType": "application/json; charset=utf-8"}
          )
          print(f"Uploaded: {key}")
          EOF

      - name: Upload summary to R2
        env:
          CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
          CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}
        run: |
          python << 'EOF'
          import boto3, os
          from datetime import datetime

          client = boto3.client('s3',
              endpoint_url=os.environ['CF_R2_ENDPOINT_URL'],
              aws_access_key_id=os.environ['CF_R2_ACCESS_KEY_ID'],
              aws_secret_access_key=os.environ['CF_R2_SECRET_ACCESS_KEY'],
              region_name='auto'
          )
          dt = datetime.now()
          bucket = os.environ['CF_R2_BUCKET_NAME']
          key = f"qatarsale/year={dt.year}/month={dt.strftime('%m')}/day={dt.strftime('%d')}/cars_for_sale/summary/scrape_summary.txt"

          client.upload_file('scrape_summary.txt', bucket, key,
              ExtraArgs={'ContentType': 'text/plain; charset=utf-8'})
          print(f'Uploaded summary: {key}')
          EOF

      - name: Merge failed URLs report
        run: |
          python << 'EOF'
          import glob
          import pandas as pd

          failed = []
          total_processed = 0

          for f in glob.glob('csv_parts/*_failed.txt'):
              with open(f, 'r', encoding='utf-8') as file:
                  for line in file:
                      line = line.strip()
                      if line.startswith('http'):
                          failed.append(line)

          files = glob.glob('csv_parts/*.csv')
          for f in files:
              total_processed += len(pd.read_csv(f))

          failed_count = len(failed)
          total_attempted = total_processed + failed_count

          failed_percentage = (
              (failed_count / total_attempted) * 100
              if total_attempted > 0 else 0
          )

          with open('failed_urls.txt', 'w', encoding='utf-8') as f:
              f.write(f'Total Processed URLs: {total_processed}\n')
              f.write(f'Total Failed URLs: {failed_count}\n')
              f.write(f'Failed URL Percentage: {failed_percentage:.2f}%\n\n')

              for u in failed:
                  f.write(u + '\n')

          print(f'Total failed URLs: {failed_count}')
          print(f'Failed percentage: {failed_percentage:.2f}%')

          EOF
      
      - name: Upload failed URLs to R2
        env:
          CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
          CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}
        run: |
          python << 'EOF'
          import boto3, os
          from datetime import datetime

          client = boto3.client('s3',
              endpoint_url=os.environ['CF_R2_ENDPOINT_URL'],
              aws_access_key_id=os.environ['CF_R2_ACCESS_KEY_ID'],
              aws_secret_access_key=os.environ['CF_R2_SECRET_ACCESS_KEY'],
              region_name='auto'
          )
          dt = datetime.now()
          bucket = os.environ['CF_R2_BUCKET_NAME']
          key = f"qatarsale/year={dt.year}/month={dt.strftime('%m')}/day={dt.strftime('%d')}/cars_for_sale/summary/failed_urls.txt"

          client.upload_file('failed_urls.txt', bucket, key,
              ExtraArgs={'ContentType': 'text/plain; charset=utf-8'})
          print(f'Uploaded failed URLs: {key}')
          EOF
      
      
      - name: Monitor - Compare with yesterday
        env:
          CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
          CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}
        run: |
          python << 'EOF'
          import boto3, os, json, glob
          import pandas as pd
          from io import BytesIO
          from datetime import datetime, timezone, timedelta

          client = boto3.client('s3',
              endpoint_url=os.environ['CF_R2_ENDPOINT_URL'],
              aws_access_key_id=os.environ['CF_R2_ACCESS_KEY_ID'],
              aws_secret_access_key=os.environ['CF_R2_SECRET_ACCESS_KEY'],
              region_name='auto'
          )
          bucket   = os.environ['CF_R2_BUCKET_NAME']
          category = "cars_for_sale"
          dt       = datetime.now(timezone.utc)
          yesterday = (dt.date() - timedelta(days=1))

          # ── Read current data (today's merged CSV parts) ──
          files = glob.glob('csv_parts/*.csv')
          if not files:
              print("No CSV files found, skipping monitor.")
              exit(0)

          current_df = pd.concat([pd.read_csv(f) for f in files], ignore_index=True)
          current_df = current_df.drop_duplicates(subset=['id'], keep='first')
          print(f"Current (today):   {len(current_df)} products")

          # ── Read previous data (yesterday's Excel from R2) ──
          file_key = (
              f"qatarsale/year={yesterday.year}/month={yesterday.strftime('%m')}/"
              f"day={yesterday.strftime('%d')}/{category}/excel/{category}.xlsx"
          )
          try:
              obj        = client.get_object(Bucket=bucket, Key=file_key)
              excel_file = BytesIO(obj["Body"].read())
              sheets     = pd.read_excel(excel_file, sheet_name=None)
              previous_df = pd.concat(sheets.values(), ignore_index=True)
              print(f"Previous (yesterday): {len(previous_df)} products")
          except Exception as e:
              print(f"Could not load yesterday's data: {e}")
              exit(0)

          # ── Compare ──
          current_df["id"]  = current_df["id"].astype(str)
          previous_df["id"] = previous_df["id"].astype(str)

          current_ids  = set(current_df["id"].dropna())
          previous_ids = set(previous_df["id"].dropna())

          removed_ids   = previous_ids - current_ids
          remaining_ids = previous_ids & current_ids

          current_indexed  = current_df.set_index("id")
          previous_indexed = previous_df.set_index("id")

          rows = []

          # Remaining - check changes
          for id_ in remaining_ids:
              if id_ not in current_indexed.index or id_ not in previous_indexed.index:
                  continue
              curr = current_indexed.loc[id_]
              prev = previous_indexed.loc[id_]

              if curr.get("isSold") and not prev.get("isSold"):
                if curr.get('advertisedFor') == 0:
                  status = "sold"
                if curr.get('advertisedFor') == 1:
                  status = "rent"
              elif curr.get("isExpired") and not prev.get("isExpired"):
                  status = "expired"
              else:
                  status = "no_change"

              rows.append({
                  "id":            id_,
                  "product_url":   curr.get("product_url", ""),
                  "isSold":        curr.get("isSold", ""),
                  "isExpired":     curr.get("isExpired", ""),
                  "status_change": status
              })
      
          monitor_df = pd.DataFrame(
              rows,
              columns=[
                  "id",
                  "product_url",
                  "isSold",
                  "isExpired",
                  "status_change",
              ]
          )

          # ── Save Excel ──
          os.makedirs("monitor", exist_ok=True)
          excel_path = f"monitor/monitor_{category}.xlsx"
          monitor_df.to_excel(excel_path, index=False)
          print(f"Saved Excel: {excel_path} ({len(monitor_df)} rows)")

          # ── Save JSON (numbers only) ──
          summary = {
              "date":       dt.strftime("%Y-%m-%d"),
              "category":   category,
              "sold":       int((monitor_df["status_change"] == "sold").sum()),
              "rent":       int((monitor_df["status_change"] == "rent").sum()),
              "expired":    int((monitor_df["status_change"] == "expired").sum()),
              "no_change":  int((monitor_df["status_change"] == "no_change").sum()),
          }
          json_path = f"monitor/monitor_{category}.json"
          with open(json_path, "w", encoding="utf-8") as f:
              json.dump(summary, f, ensure_ascii=False, indent=2)
          print(f"Saved JSON: {json_path}")
          print(f"  Sold:    {summary['sold']}")
          print(f"  Rent:    {summary['rent']}")
          print(f"  Expired: {summary['expired']}")
          print(f"  No Change: {summary['no_change']}")

          # ── Upload both to R2 ──
          for local_path, content_type, r2_suffix in [
              (excel_path, "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet", f"excel/monitor_{category}.xlsx"),
              (json_path,  "application/json; charset=utf-8", f"json/monitor_{category}.json"),
          ]:
              r2_key = (
                  f"qatarsale/year={dt.year}/month={dt.strftime('%m')}/"
                  f"day={dt.strftime('%d')}/{category}/{r2_suffix}"
              )
              client.upload_file(local_path, bucket, r2_key, ExtraArgs={"ContentType": content_type})
              print(f"Uploaded: {r2_key}")
          EOF


      
      
