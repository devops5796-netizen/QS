name: QatarSale Scraper

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  detect_pages:

    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.build_matrix.outputs.matrix }}

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install "scrapling[all]"
          playwright install chromium
          playwright install-deps chromium
          python -m patchright install chromium

      - name: Detect pages
        id: build_matrix

        run: |
          python << 'EOF'

          import json
          import math
          import os

          from scrapling import StealthyFetcher

          URL = "https://qatarsale.com/ar/products/cars_for_sale?basic_search:StatusFilter=0"

          def get_last_page():

              page = StealthyFetcher.fetch(
                  URL,
                  headless=True,
                  network_idle=True,
                  timeout=30000
              )

              numbers = []

              for el in page.find_all("[data-testid^='at-paginator-page-']"):

                  a = el.find("a")

                  if not a:
                      continue

                  href = a.attrib.get("href", "")

                  if "page=" not in href:
                      continue

                  try:
                      numbers.append(int(href.split("page=")[-1]))
                  except ValueError:
                      pass

              return max(numbers) if numbers else 1


          last_page = get_last_page()

          print(f"Last page: {last_page}")

          N_JOBS = 20

          pages_per_job = math.ceil(last_page / N_JOBS)

          matrix = {"include": []}

          for i in range(N_JOBS):

              start = i * pages_per_job + 1
              end = min((i + 1) * pages_per_job, last_page)

              if start > last_page:
                  break

              matrix["include"].append({
                  "start": start,
                  "end": end
              })

          print(json.dumps(matrix, indent=2))

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={json.dumps(matrix)}")

          EOF


  scrape:
    needs: detect_pages
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect_pages.outputs.matrix) }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install "scrapling[all]"
          playwright install chromium
          playwright install-deps chromium
          python -m patchright install chromium

      - name: Run scraper
        env:
          CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
          CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}
        run: |
          python -u main.py ${{ matrix.start }} ${{ matrix.end }}

      - name: Upload CSV artifact
        uses: actions/upload-artifact@v4
        with:
          name: csv-${{ matrix.start }}-${{ matrix.end }}
          path: |
            all_products_flat_${{ matrix.start }}_${{ matrix.end }}.csv
            all_products_${{ matrix.start }}_${{ matrix.end }}_failed.txt
  merge:
    runs-on: ubuntu-latest
    needs: scrape
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pandas
        run: pip install pandas boto3

      - name: Download all CSV artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: csv-*
          merge-multiple: true
          path: csv_parts/

      - name: Merge and analyze
        run: |
          python << 'EOF'
          import pandas as pd
          import glob

          files = glob.glob('csv_parts/*.csv')
          dfs = [pd.read_csv(f) for f in files]
          merged = pd.concat(dfs, ignore_index=True)
          merged = merged.drop_duplicates(subset=['product_url'], keep='first')
          merged.to_csv('cars_for_sale.csv', index=False, encoding='utf-8-sig')

          total = len(merged)
          print(f'Found {len(files)} CSV files to merge')
          print(f'Total Rows: {total}')

          with open('scrape_summary.txt', 'w') as f:
              f.write(f'Date: {pd.Timestamp.now().strftime("%Y-%m-%d")}\n')
              f.write(f'Total Rows: {total}\n')
              f.write(f'Files Merged: {len(files)}\n\n')
              for col in merged.columns:
                  missing = merged[col].isna().sum() + (merged[col] == '').sum()
                  pct = (missing / total) * 100
                  f.write(f'{col}: {missing} empty ({pct:.2f}%)\n')
          EOF

      - name: Split by manufacturer
        run: |
          pip install openpyxl
          python split_by_manufacturer.py cars_for_sale.csv excel_by_manufacturer
      
      - name: Upload Excel files to R2
        env:
          CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
          CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}
        run: |
          python << 'EOF'
          import boto3, os, glob
          from datetime import datetime

          client = boto3.client('s3',
              endpoint_url=os.environ['CF_R2_ENDPOINT_URL'],
              aws_access_key_id=os.environ['CF_R2_ACCESS_KEY_ID'],
              aws_secret_access_key=os.environ['CF_R2_SECRET_ACCESS_KEY'],
              region_name='auto'
          )
          dt = datetime.now()
          prefix = f"qatarsale/{dt.year}/{dt.strftime('%B').lower()}/{dt.day}/cars_for_sale_by_brand"
          bucket = os.environ['CF_R2_BUCKET_NAME']

          for f in glob.glob('excel_by_manufacturer/*.xlsx'):
              key = f"{prefix}/{os.path.basename(f)}"
              client.upload_file(f, bucket, key,
                  ExtraArgs={'ContentType': 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'})
              print(f"Uploaded: {key}")
          EOF
      
      - name: Upload final CSV to R2
        env:
          CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
          CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}
        run: |
          python << 'EOF'
          import boto3
          import os
          from datetime import datetime

          client = boto3.client(
              's3',
              endpoint_url=os.environ['CF_R2_ENDPOINT_URL'],
              aws_access_key_id=os.environ['CF_R2_ACCESS_KEY_ID'],
              aws_secret_access_key=os.environ['CF_R2_SECRET_ACCESS_KEY'],
              region_name='auto'
          )

          dt = datetime.now()
          key = f"qatarsale/{dt.year}/{dt.strftime('%B').lower()}/{dt.day}/cars_for_sale.csv"
          bucket = os.environ['CF_R2_BUCKET_NAME']

          client.upload_file(
              'cars_for_sale.csv',
              bucket,
              key,
              ExtraArgs={'ContentType': 'text/csv'}
          )
          print(f'Uploaded cars_for_sale.csv to R2: {key}')
          EOF

      - name: Merge failed URLs report
        run: |
          python << 'EOF'
          import glob

          failed = []
          for f in glob.glob('csv_parts/*_failed.txt'):
              with open(f, 'r', encoding='utf-8') as file:
                  for line in file:
                      line = line.strip()
                      if line.startswith('http'):
                          failed.append(line)

          with open('failed_urls.txt', 'w', encoding='utf-8') as f:
              f.write(f'Total Failed URLs: {len(failed)}\n\n')
              for u in failed:
                  f.write(u + '\n')

          print(f'Total failed URLs across all jobs: {len(failed)}')
          EOF
      
      - name: Commit summary
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add scrape_summary.txt failed_urls.txt
          git diff --staged --quiet || git commit -m "scrape summary $(date +'%Y-%m-%d')"
          git push
      
