name: QatarSale Scraper

on:
  schedule:
    - cron: '0 0 * * 1' 
  workflow_dispatch: 

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pandas beautifulsoup4 playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper and save report
        run: |
          python main.py > scrape_report.txt 2>&1

      - name: Commit results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add scrape_report.txt
          git commit --allow-empty -m "Auto scrape report: $(date +'%Y-%m-%d')"
          git push