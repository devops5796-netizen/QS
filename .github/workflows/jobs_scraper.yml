name: QatarSale Jobs Scraper

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  detect_pages:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build_matrix.outputs.matrix }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - id: build_matrix
        run: |
          python << 'EOF'
          import requests, json, os

          API_URL = "ضع هنا API الخاص بالوظائف"

          payload = {
              "currentPage": 0,
              "pageSize": 15
          }

          headers = {
              "Content-Type":"application/json",
              "Accept":"application/json",
              "User-Agent":"Mozilla/5.0"
          }

          r = requests.post(API_URL, json=payload, headers=headers)
          data = r.json()

          total_pages = data["pagesCount"]

          matrix = {
              "include":[
                  {
                      "start_page":i,
                      "end_page":i
                  }
                  for i in range(total_pages)
              ]
          }

          with open(os.environ["GITHUB_OUTPUT"],"a") as f:
              f.write(f"matrix={json.dumps(matrix)}\n")
          EOF

  scrape_jobs:
    runs-on: ubuntu-latest
    needs: detect_pages

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect_pages.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - run: |
          pip install -r requirements.txt
          pip install "scrapling[all]" openpyxl boto3
          playwright install chromium
          playwright install-deps chromium
          python -m patchright install chromium

      - name: Run scraper
        env:
          CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
          CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}
        run: |
          python -u jobs_scraper.py \
            ${{ matrix.start_page }} \
            ${{ matrix.end_page }}

      - uses: actions/upload-artifact@v4
        with:
          name: jobs-excel-${{ matrix.start_page }}-${{ matrix.end_page }}
          path: |
            jobs_${{ matrix.start_page }}_${{ matrix.end_page }}.xlsx
            failed_urls_${{ matrix.start_page }}_${{ matrix.end_page }}.txt
          if-no-files-found: ignore

  merge_jobs:
    runs-on: ubuntu-latest
    needs: scrape_jobs

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas openpyxl boto3

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: jobs-excel-*
          merge-multiple: true
          path: excel_parts/

      - name: Merge and upload to R2
        env:
          CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
          CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}
        run: |
          python << 'EOF'
          import pandas as pd
          import glob, os, boto3
          from datetime import datetime

          dt     = datetime.now()
          base   = f"qatarsale/year={dt.year}/month={dt.strftime('%m')}/day={dt.strftime('%d')}/jobs"
          bucket = os.environ['CF_R2_BUCKET_NAME']

          client = boto3.client('s3',
              endpoint_url=os.environ['CF_R2_ENDPOINT_URL'],
              aws_access_key_id=os.environ['CF_R2_ACCESS_KEY_ID'],
              aws_secret_access_key=os.environ['CF_R2_SECRET_ACCESS_KEY'],
              region_name='auto'
          )

          # Merge Excel
          files = glob.glob('excel_parts/*.xlsx')
          if not files:
              print("No Excel files found!")
              exit(0)

          dfs    = [pd.read_excel(f) for f in files]
          merged = pd.concat(dfs, ignore_index=True)
          merged = merged.drop_duplicates(subset=['api_job_url'], keep='first')
          total  = len(merged)
          print(f"Merged {len(files)} files | {total} total jobs")

          output_file = "jobs.xlsx"
          merged.to_excel(output_file, index=False, sheet_name="jobs")

          # Upload Excel
          key = f"{base}/excel/jobs.xlsx"
          client.upload_file(output_file, bucket, key,
              ExtraArgs={'ContentType': 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'})
          print(f"Uploaded: {key}")

          # Summary
          summary_file = "scrape_summary.txt"
          with open(summary_file, 'w', encoding='utf-8') as f:
              f.write(f"=== jobs ===\n")
              f.write(f"Run Date: {dt.strftime('%Y-%m-%d %H:%M:%S')} UTC\n")
              f.write(f"Status: DONE\n")
              f.write(f"Total Rows: {total}\n\n")
              f.write("--- Column Analysis ---\n")
              for col in merged.columns:
                  missing = merged[col].isna().sum() + (merged[col] == '').sum()
                  pct = (missing / total) * 100 if total > 0 else 0
                  f.write(f"{col}: {missing} empty ({pct:.2f}%)\n")

          key = f"{base}/summary/scrape_summary.txt"
          client.upload_file(summary_file, bucket, key,
              ExtraArgs={'ContentType': 'text/plain; charset=utf-8'})
          print(f"Uploaded: {key}")

          # Failed URLs
          failed = []
          for f in glob.glob('excel_parts/failed_urls_*.txt'):
              with open(f, 'r', encoding='utf-8') as file:
                  for line in file:
                      line = line.strip()
                      if line.startswith('http'):
                          failed.append(line)

          failed_file = "failed_urls.txt"
          with open(failed_file, 'w', encoding='utf-8') as f:
              f.write(f"Total Failed URLs: {len(failed)}\n\n")
              for u in failed:
                  f.write(u + '\n')

          key = f"{base}/summary/failed_urls.txt"
          client.upload_file(failed_file, bucket, key,
              ExtraArgs={'ContentType': 'text/plain; charset=utf-8'})
          print(f"Uploaded: {key}")
          EOF

      - name: Upload to R2
        env:
          CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
          CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}
        run: |
          python << 'EOF'
          import boto3, os, json
          from datetime import datetime
          import pandas as pd

          dt = datetime.now()
          base = f"qatarsale/year={dt.year}/month={dt.strftime('%m')}/day={dt.strftime('%d')}/jobs"

          client = boto3.client('s3',
              endpoint_url=os.environ['CF_R2_ENDPOINT_URL'],
              aws_access_key_id=os.environ['CF_R2_ACCESS_KEY_ID'],
              aws_secret_access_key=os.environ['CF_R2_SECRET_ACCESS_KEY'],
              region_name='auto'
          )
          bucket = os.environ['CF_R2_BUCKET_NAME']

          # Upload Excel
          excel_file = "jobs.xlsx"
          if os.path.exists(excel_file):
              key = f"{base}/excel/jobs.xlsx"
              client.upload_file(excel_file, bucket, key,
                  ExtraArgs={'ContentType': 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'})
              print(f"Uploaded: {key}")
          else:
              print("WARNING: jobs.xlsx not found!")

          # Generate summary
          summary_file = "scrape_summary.txt"
          if os.path.exists(excel_file):
              df = pd.read_excel(excel_file)
              total = len(df)
              with open(summary_file, 'w', encoding='utf-8') as f:
                  f.write(f"=== jobs ===\n")
                  f.write(f"Run Date: {dt.strftime('%Y-%m-%d %H:%M:%S')} UTC\n")
                  f.write(f"Status: DONE\n")
                  f.write(f"Total Rows: {total}\n\n")
                  f.write("--- Column Analysis ---\n")
                  for col in df.columns:
                      missing = df[col].isna().sum() + (df[col] == '').sum()
                      pct = (missing / total) * 100 if total > 0 else 0
                      f.write(f"{col}: {missing} empty ({pct:.2f}%)\n")
          else:
              with open(summary_file, 'w', encoding='utf-8') as f:
                  f.write(f"=== jobs ===\n")
                  f.write(f"Run Date: {dt.strftime('%Y-%m-%d %H:%M:%S')} UTC\n")
                  f.write(f"Status: FAILED - no Excel file generated\n")

          key = f"{base}/summary/scrape_summary.txt"
          client.upload_file(summary_file, bucket, key,
              ExtraArgs={'ContentType': 'text/plain; charset=utf-8'})
          print(f"Uploaded: {key}")

          # Failed URLs
          failed_file = "failed_urls.txt"
          if os.path.exists(failed_file):
              key = f"{base}/summary/failed_urls.txt"
              client.upload_file(failed_file, bucket, key,
                  ExtraArgs={'ContentType': 'text/plain; charset=utf-8'})
              print(f"Uploaded: {key}")
          else:
              print("No failed URLs file found.")
          EOF