name: QatarSale Jobs Scraper

on:
  workflow_run:
    workflows: ["QatarSale Scraper"]
    types:
      - completed
  workflow_dispatch:

jobs:
  scrape_jobs:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install openpyxl boto3

      - name: Run scraper
        env:
          CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
          CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}
        run: |
          python -u jobs_scraper.py

      - uses: actions/upload-artifact@v4
        with:
          name: jobs-excel-all
          path: |
            jobs_*.xlsx
            failed_urls*.txt
            jobs_*_request_stats.json
          if-no-files-found: ignore

  merge_jobs:
    runs-on: ubuntu-latest
    needs: scrape_jobs

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas openpyxl boto3

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: jobs-excel-*
          merge-multiple: true
          path: excel_parts/

      - name: Merge and upload to R2
        env:
          CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
          CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}
        run: |
          python << 'EOF'
          import pandas as pd
          import glob, os, boto3
          from datetime import datetime
          import json

          dt     = datetime.now()
          base   = f"qatarsale/year={dt.year}/month={dt.strftime('%m')}/day={dt.strftime('%d')}/jobs"
          bucket = os.environ['CF_R2_BUCKET_NAME']

          client = boto3.client('s3',
              endpoint_url=os.environ['CF_R2_ENDPOINT_URL'],
              aws_access_key_id=os.environ['CF_R2_ACCESS_KEY_ID'],
              aws_secret_access_key=os.environ['CF_R2_SECRET_ACCESS_KEY'],
              region_name='auto'
          )

          stats_files = glob.glob('excel_parts/*_request_stats.json')
          if stats_files:
              with open(stats_files[0], 'r', encoding='utf-8') as sf:
                  job_stats = json.load(sf)
              print(f"Request stats: {job_stats['total_requests']} req | {job_stats['total_req_per_min']} req/min")

              key = f"{base}/summary/request_stats.json"
              client.upload_file(stats_files[0], bucket, key,
                  ExtraArgs={'ContentType': 'application/json; charset=utf-8'})
              print(f"Uploaded: {key}")

          # Merge Excel
          files = glob.glob('excel_parts/*.xlsx')
          if not files:
              print("No Excel files found. Nothing to merge.")
              now = datetime.now()
              with open('scrape_summary.txt', 'w', encoding='utf-8') as f:
                  f.write(f'=== Jobs ===\n')
                  f.write(f'Run Date: {now.strftime("%Y-%m-%d %H:%M:%S")} UTC\n')
                  f.write(f'Status: NO DATA\n')
                  f.write(f'Total Rows: 0\n')
                  f.write(f'Files Merged: 0\n')
              pd.DataFrame().to_excel('jobs.xlsx', index=False)

              pd.DataFrame().to_excel('jobs.xlsx', index=False)
              with open('jobs.json', 'w', encoding='utf-8') as f:
                  json.dump([], f, ensure_ascii=False, indent=2)

              output_file = "jobs.xlsx"
              key = f"{base}/excel/jobs.xlsx"
              client.upload_file(output_file, bucket, key,
                  ExtraArgs={'ContentType': 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'})
              print(f"Uploaded: {key}")

              key = f"{base}/json/jobs.json"
              client.upload_file("jobs.json", bucket, key,
                  ExtraArgs={'ContentType': 'application/json; charset=utf-8'})
              print(f"Uploaded: {key}")

              key = f"{base}/summary/scrape_summary.txt"
              client.upload_file("scrape_summary.txt", bucket, key,
                  ExtraArgs={'ContentType': 'text/plain; charset=utf-8'})
              print(f"Uploaded: {key}")

              exit(0)

          dfs    = [pd.read_excel(f) for f in files]
          merged = pd.concat(dfs, ignore_index=True)
          merged = merged.drop_duplicates(subset=['job_url'], keep='first')
          total = len(merged)
          print(f"Merged {len(files)} files | {total} total jobs")

          json_file = "jobs.json"
          json_data = merged.to_dict(orient='records')
          with open(json_file, 'w', encoding='utf-8') as f:
              json.dump(json_data, f, ensure_ascii=False, indent=2)
          print(f"JSON saved: {json_file} ({len(json_data)} records)")

          output_file = "jobs.xlsx"
          merged.to_excel(output_file, index=False, sheet_name="jobs")

          key = f"{base}/excel/jobs.xlsx"
          client.upload_file(output_file, bucket, key,
              ExtraArgs={'ContentType': 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'})
          print(f"Uploaded: {key}")

          key_j = f"{base}/json/jobs.json"
          client.upload_file(
              "jobs.json",
              bucket,
              key_j,
              ExtraArgs={"ContentType": "application/json; charset=utf-8"}
          )
          print(f"Uploaded: {key_j}")

          summary_file = "scrape_summary.txt"
          with open(summary_file, 'w', encoding='utf-8') as f:
              f.write(f"=== jobs ===\n")
              f.write(f"Run Date: {dt.strftime('%Y-%m-%d %H:%M:%S')} UTC\n")
              f.write(f"Status: DONE\n")
              f.write(f"Total Rows: {total}\n\n")
              f.write("--- Column Analysis ---\n")
              for col in merged.columns:
                  missing = merged[col].isna().sum() + (merged[col] == '').sum()
                  pct = (missing / total) * 100 if total > 0 else 0
                  f.write(f"{col}: {missing} empty ({pct:.2f}%)\n")

          key = f"{base}/summary/scrape_summary.txt"
          client.upload_file(summary_file, bucket, key,
              ExtraArgs={'ContentType': 'text/plain; charset=utf-8'})
          print(f"Uploaded: {key}")

          failed = []
          for f in glob.glob('excel_parts/failed_urls*.txt'):
              with open(f, 'r', encoding='utf-8') as file:
                  for line in file:
                      line = line.strip()
                      if line.startswith('http'):
                          failed.append(line)

          failed_file = "failed_urls.txt"
          with open(failed_file, 'w', encoding='utf-8') as f:
              f.write(f"Total Failed URLs: {len(failed)}\n\n")
              for u in failed:
                  f.write(u + '\n')

          key = f"{base}/summary/failed_urls.txt"
          client.upload_file(failed_file, bucket, key,
              ExtraArgs={'ContentType': 'text/plain; charset=utf-8'})
          print(f"Uploaded: {key}")
          EOF