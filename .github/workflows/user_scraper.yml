name: QatarSale Users Scraper

on:
  workflow_run:
    workflows: ["QatarSale Jobs Scraper"]
    types:
      - completed
  workflow_dispatch:

jobs:
  scrape_users:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install openpyxl boto3

      - name: Run scraper
        env:
          CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
          CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}
        run: |
          python -u user_scraper.py

      - name: Upload Excel artifact
        uses: actions/upload-artifact@v4
        with:
          name: users-excel-all
          path: |
            users_*.xlsx
            failed_urls*.txt
            users_*_request_stats.json
          if-no-files-found: ignore

  merge_users:
    runs-on: ubuntu-latest
    needs: scrape_users

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas openpyxl boto3

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: users-excel-*
          merge-multiple: true
          path: excel_parts/

      - name: Merge and upload to R2
        env:
          CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
          CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}
        run: |
          python << 'EOF'
          import pandas as pd
          import glob, os, boto3
          from datetime import datetime, timezone
          import json

          dt     = datetime.now(timezone.utc)
          base   = f"qatarsale/year={dt.year}/month={dt.strftime('%m')}/day={dt.strftime('%d')}/users"
          bucket = os.environ['CF_R2_BUCKET_NAME']

          client = boto3.client('s3',
              endpoint_url=os.environ['CF_R2_ENDPOINT_URL'],
              aws_access_key_id=os.environ['CF_R2_ACCESS_KEY_ID'],
              aws_secret_access_key=os.environ['CF_R2_SECRET_ACCESS_KEY'],
              region_name='auto'
          )

          # Merge Excel -- if nothing was scraped, stop here entirely (no uploads at all)
          files = glob.glob('excel_parts/*.xlsx')
          if not files:
              print("No Excel files found -- nothing scraped for yesterday, skipping all uploads.")
              exit(0)

          dfs    = [pd.read_excel(f) for f in files]
          merged = pd.concat(dfs, ignore_index=True)
          merged = merged.drop_duplicates(subset=['profile_url'], keep='first')
          total  = len(merged)
          print(f"Merged {len(files)} files | {total} total users")

          if total == 0:
              print("Merged result is empty -- skipping all uploads.")
              exit(0)

          json_file = "users.json"
          json_data = merged.to_dict(orient='records')
          with open(json_file, 'w', encoding='utf-8') as f:
              json.dump(json_data, f, ensure_ascii=False, indent=2)
          print(f"JSON saved: {json_file} ({len(json_data)} records)")

          output_file = "users.xlsx"
          merged.to_excel(output_file, index=False, sheet_name="users")

          key = f"{base}/excel/users.xlsx"
          client.upload_file(output_file, bucket, key,
              ExtraArgs={'ContentType': 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'})
          print(f"Uploaded: {key}")

          key_u = f"{base}/json/users.json"
          client.upload_file(
              "users.json",
              bucket,
              key_u,
              ExtraArgs={"ContentType": "application/json; charset=utf-8"}
          )
          print(f"Uploaded: {key_u}")

          # No categories/subcategories for users -- same top-level shape as
          # the category summaries, with subcategories always empty.
          summary = {
              "scraped_at": dt.isoformat(),
              "data_scraped_date": dt.date().isoformat(),
              "saved_to_R2_date": dt.strftime("%Y-%m-%d"),
              "total_subcategories": 0,
              "total_listings": total,
              "subcategories": [],
          }
          with open("summary.json", "w", encoding="utf-8") as f:
              json.dump(summary, f, ensure_ascii=False, indent=2)

          key = f"{base}/summary/summary.json"
          client.upload_file("summary.json", bucket, key,
              ExtraArgs={'ContentType': 'application/json; charset=utf-8'})
          print(f"Uploaded: {key}")

          # Failed URLs
          failed = []
          for f in glob.glob('excel_parts/failed_urls*.txt'):
              with open(f, 'r', encoding='utf-8') as file:
                  for line in file:
                      line = line.strip()
                      if line.startswith('http'):
                          failed.append(line)

          if failed:
              failed_file = "failed_urls.txt"
              with open(failed_file, 'w', encoding='utf-8') as f:
                  f.write(f"Total Failed URLs: {len(failed)}\n\n")
                  for u in failed:
                      f.write(u + '\n')

              key = f"{base}/summary/failed_urls.txt"
              client.upload_file(failed_file, bucket, key,
                  ExtraArgs={'ContentType': 'text/plain; charset=utf-8'})
              print(f"Uploaded: {key}")

          # Request stats
          stats_files = glob.glob('excel_parts/*_request_stats.json')
          if stats_files:
              with open(stats_files[0], 'r', encoding='utf-8') as sf:
                  user_stats = json.load(sf)
              print(f"Request stats: {user_stats['total_requests']} req | {user_stats['total_req_per_min']} req/min")

              key = f"{base}/summary/request_stats.json"
              client.upload_file(stats_files[0], bucket, key,
                  ExtraArgs={'ContentType': 'application/json; charset=utf-8'})
              print(f"Uploaded: {key}")
          EOF

  trigger_next:
    runs-on: ubuntu-latest
    needs: merge_users
    if: ${{ success() }}
    steps:
      - name: Trigger Sub Categories workflow
        run: |
            curl -X POST \
            -H "Authorization: token ${{ secrets.PAT_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/devops5796-netizen/QS2/dispatches \
            -d '{"event_type": "users-done"}'