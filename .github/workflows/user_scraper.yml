name: QatarSale Users Scraper

on:
  workflow_run:
    workflows: ["QatarSale Jobs Scraper"]
    types:
      - completed
  workflow_dispatch:

jobs:
  detect_pages:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    outputs:
      matrix: ${{ steps.build_matrix.outputs.matrix }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Detect pages and build matrix
        id: build_matrix
        run: |
          python << 'EOF'
          import requests, json, os

          API_URL = "https://production-api.qatarsale.com/api/ApplicantProfile/Search"
          HEADERS = {
              "Content-Type": "application/json",
              "Accept": "application/json",
              "User-Agent": "Mozilla/5.0",
              "Referer": "https://qatarsale.com/",
              "Origin": "https://qatarsale.com",
          }
          payload = {
              "currentPage": 0, "pageSize": 15, "sortBy": 0,
              "employmentTypes": [], "searchTerm": "", "yearsOfExperience": [],
              "cities": [], "countries": [], "degrees": [], "languages": [],
              "opportunityUri": None, "skills": [], "workFields": [], "workSpecialities": [],
              "isFavorite": False
          }

          r = requests.post(API_URL, json=payload, headers=HEADERS, timeout=30)
          data = r.json()
          total_pages = data.get("pagesCount", 1)
          total_users = data.get("count", 0)

          print(f"Total pages: {total_pages} | Total users: {total_users}")

          matrix = {"include": []}
          for page in range(total_pages):
              matrix["include"].append({
                  "start_page": page,
                  "end_page":   page
              })

          print(f"Matrix: {json.dumps(matrix, indent=2)}")

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"matrix={json.dumps(matrix)}\n")
          EOF

  scrape_users:
    runs-on: ubuntu-latest
    needs: detect_pages
    strategy:
      matrix: ${{ fromJson(needs.detect_pages.outputs.matrix) }}
      fail-fast: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install "scrapling[all]" openpyxl boto3
          playwright install chromium
          playwright install-deps chromium
          python -m patchright install chromium

      - name: Run scraper
        env:
          CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
          CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}
        run: |
          python -u user_scraper.py ${{ matrix.start_page }} ${{ matrix.end_page }}

      - name: Upload Excel artifact
        uses: actions/upload-artifact@v4
        with:
          name: users-excel-${{ matrix.start_page }}-${{ matrix.end_page }}
          path: |
            users_${{ matrix.start_page }}_${{ matrix.end_page }}.xlsx
            failed_urls_${{ matrix.start_page }}_${{ matrix.end_page }}.txt
          if-no-files-found: ignore

  merge_users:
    runs-on: ubuntu-latest
    needs: scrape_users

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas openpyxl boto3

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: users-excel-*
          merge-multiple: true
          path: excel_parts/

      - name: Merge and upload to R2
        env:
          CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
          CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}
        run: |
          python << 'EOF'
          import pandas as pd
          import glob, os, boto3
          from datetime import datetime

          dt     = datetime.now()
          base   = f"qatarsale/year={dt.year}/month={dt.strftime('%m')}/day={dt.strftime('%d')}/users"
          bucket = os.environ['CF_R2_BUCKET_NAME']

          client = boto3.client('s3',
              endpoint_url=os.environ['CF_R2_ENDPOINT_URL'],
              aws_access_key_id=os.environ['CF_R2_ACCESS_KEY_ID'],
              aws_secret_access_key=os.environ['CF_R2_SECRET_ACCESS_KEY'],
              region_name='auto'
          )

          # Merge Excel
          files = glob.glob('excel_parts/*.xlsx')
          if not files:
              print("No Excel files found!")
              exit(0)

          dfs    = [pd.read_excel(f) for f in files]
          merged = pd.concat(dfs, ignore_index=True)
          merged = merged.drop_duplicates(subset=['api_profile_url'], keep='first')
          total  = len(merged)
          print(f"Merged {len(files)} files | {total} total users")

          output_file = "users.xlsx"
          merged.to_excel(output_file, index=False, sheet_name="users")

          # Upload Excel
          key = f"{base}/excel/users.xlsx"
          client.upload_file(output_file, bucket, key,
              ExtraArgs={'ContentType': 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'})
          print(f"Uploaded: {key}")

          # Summary
          summary_file = "scrape_summary.txt"
          with open(summary_file, 'w', encoding='utf-8') as f:
              f.write(f"=== users ===\n")
              f.write(f"Run Date: {dt.strftime('%Y-%m-%d %H:%M:%S')} UTC\n")
              f.write(f"Status: DONE\n")
              f.write(f"Total Rows: {total}\n\n")
              f.write("--- Column Analysis ---\n")
              for col in merged.columns:
                  missing = merged[col].isna().sum() + (merged[col] == '').sum()
                  pct = (missing / total) * 100 if total > 0 else 0
                  f.write(f"{col}: {missing} empty ({pct:.2f}%)\n")

          key = f"{base}/summary/scrape_summary.txt"
          client.upload_file(summary_file, bucket, key,
              ExtraArgs={'ContentType': 'text/plain; charset=utf-8'})
          print(f"Uploaded: {key}")

          # Failed URLs
          failed = []
          for f in glob.glob('excel_parts/failed_urls_*.txt'):
              with open(f, 'r', encoding='utf-8') as file:
                  for line in file:
                      line = line.strip()
                      if line.startswith('http'):
                          failed.append(line)

          failed_file = "failed_urls.txt"
          with open(failed_file, 'w', encoding='utf-8') as f:
              f.write(f"Total Failed URLs: {len(failed)}\n\n")
              for u in failed:
                  f.write(u + '\n')

          key = f"{base}/summary/failed_urls.txt"
          client.upload_file(failed_file, bucket, key,
              ExtraArgs={'ContentType': 'text/plain; charset=utf-8'})
          print(f"Uploaded: {key}")
          EOF


  trigger_next:
    runs-on: ubuntu-latest
    needs: merge_users
    if: ${{ success() }}
    steps:
      - name: Trigger Sub Categories workflow
        run: |
            curl -X POST \
            -H "Authorization: token ${{ secrets.PAT_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/devops5796-netizen/QS2/dispatches \
            -d '{"event_type": "users-done"}'